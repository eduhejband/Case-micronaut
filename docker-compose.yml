services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: riskengine-dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"

  riskengine-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: riskengine-api
    depends_on:
      - dynamodb-local
    ports:
      - "8080:8080"
    environment:
      JAVA_OPTS: ""
      MICRONAUT_SERVER_HOST: "0.0.0.0"
      RISKENGINE_DYNAMODB_TABLE_NAME: "RiskEvents"
      RISKENGINE_DYNAMODB_ENDPOINT: "http://dynamodb-local:8000"
      RISKENGINE_DYNAMODB_REGION: "us-east-1"